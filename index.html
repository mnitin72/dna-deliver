<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Deliver - Premium Apparel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <h2>DNA DELIVER</h2>
  <div class="cart-btn" onclick="openCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Next Level Apparel</h1>
  <p>The DNA of India. Built for the World.</p>
  <button onclick="scrollToProducts()">Shop Now</button>
</section>

<!-- PRODUCTS -->
<section class="products" id="products">

  <div class="product-card">
    <h3>Oversized Tee</h3>
    <p>₹799</p>
    <button onclick="addToCart('Oversized Tee',799)">Add to Cart</button>
  </div>

  <div class="product-card">
    <h3>Premium Hoodie</h3>
    <p>₹1299</p>
    <button onclick="addToCart('Premium Hoodie',1299)">Add to Cart</button>
  </div>

  <div class="product-card">
    <h3>Joggers</h3>
    <p>₹999</p>
    <button onclick="addToCart('Joggers',999)">Add to Cart</button>
  </div>

</section>

<!-- CART SIDEBAR -->
<div id="cart" class="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3 id="total">Total: ₹0</h3>
  <button onclick="alert('Checkout Coming Soon!')">Checkout</button>
  <button onclick="closeCart()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
