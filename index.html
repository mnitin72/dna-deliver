<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Deliver - Next Level Apparel</title>
<link rel="stylesheet" href="style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>DNA DELIVER</h1>
    <p>Next Level Apparel • Built for India • Designed for the World</p>
    <button onclick="scrollDown()">Explore Collection</button>
  </div>
</section>

<!-- COLLECTION -->
<section class="section">
  <h2>Featured Collection</h2>

  <div class="grid">

    <div class="card">
      <div class="img box1"></div>
      <h3>Oversized Tee</h3>
      <p>Streetwear Essential</p>
    </div>

    <div class="card">
      <div class="img box2"></div>
      <h3>Premium Hoodie</h3>
      <p>Winter Drop 2026</p>
    </div>

    <div class="card">
      <div class="img box3"></div>
      <h3>Joggers</h3>
      <p>Everyday Comfort</p>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 DNA Deliver • Made in India 🇮🇳</p>
</footer>

<script>
function scrollDown(){
  document.querySelector('.section').scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
